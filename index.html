<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1000小时精耕计划</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: #eef0f4;
    color: #1f2937;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- soft bg ---- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(124,58,237,.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(251,146,60,.05) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }

  /* ---- header ---- */
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: 2rem; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(135deg, #a78bfa, #f472b6, #fb923c);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header p { color: #6b7280; font-size: .9rem; margin-top: 6px; }

  /* ---- big ring ---- */
  .ring-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; }

  .ring-wrap { position: relative; width: 220px; height: 220px; }
  .ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: #e5e7eb; stroke-width: 14; }
  .ring-progress { fill: none; stroke-width: 14; stroke-linecap: round;
    stroke: url(#ringGrad);
    transition: stroke-dashoffset .6s ease; }

  .ring-inner {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
  }
  .ring-pct { font-size: 2.2rem; font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #f472b6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .ring-label { font-size: .75rem; color: #6b7280; }

  /* ---- stats row ---- */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card {
    background: #fff;
    border: 1px solid #e8ecf1;
    border-radius: 16px; padding: 16px; text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .stat-val { font-size: 1.6rem; font-weight: 700; }
  .stat-val.purple { color: #7c3aed; }
  .stat-val.pink { color: #db2777; }
  .stat-val.orange { color: #ea580c; }
  .stat-lbl { font-size: .75rem; color: #6b7280; margin-top: 4px; }

  /* ---- timer card ---- */
  .timer-card {
    background: #fff;
    border: 1px solid #e8ecf1;
    border-radius: 20px; padding: 28px; margin-bottom: 20px; text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .timer-display {
    font-size: 3.5rem; font-weight: 800; letter-spacing: 4px;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(135deg, #a78bfa, #f472b6, #fb923c);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .timer-sub { font-size: .8rem; color: #6b7280; margin-bottom: 20px; }

  .session-input { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .session-input input, .session-input select {
    background: #fff;
    border: 1px solid #d1d5db;
    border-radius: 10px; padding: 8px 14px; color: #2d3748;
    font-size: .85rem; outline: none;
  }
  .session-input input:focus, .session-input select:focus { border-color: #a78bfa; }
  .session-input input { width: 180px; }

  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .btn {
    padding: 12px 28px; border-radius: 12px; border: none; cursor: pointer;
    font-size: .9rem; font-weight: 600; letter-spacing: .5px; transition: all .2s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }

  .btn-start  { background: linear-gradient(135deg, #7c3aed, #a78bfa); color: #fff; box-shadow: 0 4px 20px rgba(124,58,237,.4); }
  .btn-pause  { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
  .btn-stop   { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
  .btn-log    { background: linear-gradient(135deg, #db2777, #f472b6); color: #fff; box-shadow: 0 4px 20px rgba(219,39,119,.35); }
  .btn-sync   { background: rgba(124,58,237,.15); border: 1px solid rgba(124,58,237,.3); color: #a78bfa; padding: 8px 16px; font-size: .8rem; border-radius: 10px; cursor: pointer; transition: all .2s; }
  .btn-sync:hover { background: rgba(124,58,237,.25); }

  /* ---- manual add ---- */
  .manual-card {
    background: #fff;
    border: 1px solid #e8ecf1;
    border-radius: 16px; padding: 20px; margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .manual-card h3 { font-size: .9rem; color: #4b5563; margin-bottom: 12px; }
  .manual-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .manual-row input, .manual-row select {
    background: #fff;
    border: 1px solid #d1d5db;
    border-radius: 10px; padding: 8px 12px; color: #2d3748;
    font-size: .85rem; outline: none;
  }
  .manual-row input:focus, .manual-row select:focus { border-color: #f472b6; }
  .inp-date { width: 150px; }
  .inp-hours { width: 100px; }
  .inp-note { flex: 1; min-width: 160px; }

  /* ---- progress bar ---- */
  .progress-section { margin-bottom: 24px; }
  .progress-label { display: flex; justify-content: space-between; font-size: .82rem; color: #6b7280; margin-bottom: 8px; }
  .progress-track { background: #e5e7eb; border-radius: 999px; height: 10px; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, #7c3aed, #a78bfa, #f472b6, #fb923c);
    transition: width .6s ease;
  }

  /* ---- milestone badges ---- */
  .milestones { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
  .milestone {
    padding: 5px 14px; border-radius: 999px; font-size: .75rem; font-weight: 600;
    border: 1px solid #d1d5db;
    background: #fff; color: #9ca3af;
    transition: all .3s;
  }
  .milestone.done { background: rgba(124,58,237,.1); border-color: #7c3aed; color: #7c3aed; }
  .milestone.done::before { content: '✓ '; }

  /* ---- log table ---- */
  .log-section h3 { font-size: .95rem; font-weight: 600; margin-bottom: 14px; color: #374151; }
  .log-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  .log-table th {
    text-align: left; padding: 10px 12px;
    color: #6b7280; font-weight: 500; border-bottom: 1px solid #e5e7eb;
  }
  .log-table td { padding: 10px 12px; border-bottom: 1px solid #f3f4f6; color: #374151; }
  .log-table tr:hover td { background: #f9fafb; }
  .badge-cat {
    display: inline-block; padding: 2px 10px; border-radius: 999px;
    font-size: .72rem; font-weight: 600;
  }
  .bc-保险 { background: rgba(167,139,250,.15); color: #a78bfa; }
  .bc-财商 { background: rgba(251,146,60,.15); color: #fb923c; }
  .bc-演讲 { background: rgba(244,114,182,.15); color: #f472b6; }
  .bc-其他 { background: rgba(107,114,128,.1); color: #6b7280; }

  .empty-tip { text-align: center; color: #9ca3af; padding: 32px 0; }
  .empty-tip span { font-size: 2rem; display: block; margin-bottom: 8px; }
  .empty-tip p { color: #9ca3af; font-size: .85rem; }

  /* ---- quote ---- */
  .quote-bar {
    text-align: center; padding: 20px;
    color: #9ca3af; font-size: .85rem; font-style: italic;
    border-top: 1px solid #e5e7eb; margin-top: 32px;
  }

  /* ---- toast ---- */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: rgba(124,58,237,.9); color: #fff;
    padding: 12px 28px; border-radius: 999px; font-size: .85rem; font-weight: 600;
    transition: transform .35s ease, opacity .35s ease; opacity: 0; z-index: 999;
    backdrop-filter: blur(12px);
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  @media (max-width: 600px) {
    .timer-display { font-size: 2.4rem; }
    .stats { grid-template-columns: repeat(3,1fr); }
    .stat-val { font-size: 1.2rem; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>⚡ 1000小时精耕计划</h1>
    <p>每一分钟的积累，都是蜕变的基石</p>
    <div style="margin-top:10px;display:flex;gap:8px;justify-content:center">
      <button class="btn btn-sync" onclick="cloudSave()" id="btnCloudSave">☁️ 云端保存</button>
      <button class="btn btn-sync" onclick="cloudLoad()" id="btnCloudLoad">⬇️ 云端加载</button>
      <button class="btn btn-sync" onclick="resetGistConfig()">⚙️ 配置</button>
      <button class="btn btn-sync" onclick="exportData()">📤 导出数据</button>
      <button class="btn btn-sync" onclick="document.getElementById('importFile').click()">📥 导入数据</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"/>
    </div>
  </div>

  <!-- BIG RING + STATS -->
  <div class="ring-section">
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 220 220">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7c3aed"/>
            <stop offset="50%" stop-color="#f472b6"/>
            <stop offset="100%" stop-color="#fb923c"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="110" cy="110" r="96"/>
        <circle class="ring-progress" id="ringCircle" cx="110" cy="110" r="96"
          stroke-dasharray="603.19" stroke-dashoffset="603.19"/>
      </svg>
      <div class="ring-inner">
        <div class="ring-pct" id="ringPct">0%</div>
        <div class="ring-label">完成进度</div>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-val purple" id="statDone">0</div>
      <div class="stat-lbl">已完成（小时）</div>
    </div>
    <div class="stat-card">
      <div class="stat-val pink" id="statDays">0</div>
      <div class="stat-lbl">已打卡天数</div>
    </div>
    <div class="stat-card">
      <div class="stat-val orange" id="statCount">0</div>
      <div class="stat-lbl">已完成次数</div>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-section">
    <div class="progress-label">
      <span>0h</span><span id="progLabel">0 / 1000 小时</span><span>1000h</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- MILESTONES -->
  <div class="milestones" id="milestones"></div>

  <!-- TIMER CARD -->
  <div class="timer-card">
    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <div class="timer-sub" id="timerSub">准备好了吗？点击开始记录今天的练习</div>

    <div class="session-input">
      <input type="text" id="sessionNote" placeholder="今天练习内容（可选）" />
      <select id="sessionCat">
        <option value="保险">保险营销</option>
        <option value="财商">财商教育</option>
        <option value="演讲">演讲表达</option>
        <option value="其他">其他</option>
      </select>
    </div>

    <div class="btn-row">
      <button class="btn btn-start" id="btnStart" onclick="startTimer()">▶ 开始</button>
      <button class="btn btn-pause" id="btnPause" onclick="pauseTimer()" style="display:none">⏸ 暂停</button>
      <button class="btn btn-stop" id="btnStop" onclick="stopTimer()" style="display:none">⏹ 停止</button>
      <button class="btn btn-log" onclick="saveSession()">💾 记录本次</button>
    </div>
  </div>

  <!-- MANUAL ADD -->
  <div class="manual-card">
    <h3>📝 手动补录历史练习</h3>
    <div class="manual-row">
      <input class="inp-date" type="date" id="manDate" />
      <input class="inp-hours" type="number" id="manHours" placeholder="小时数" min="0.1" step="0.1" />
      <select id="manCat">
        <option value="保险">保险营销</option>
        <option value="财商">财商教育</option>
        <option value="演讲">演讲表达</option>
        <option value="其他">其他</option>
      </select>
      <input class="inp-note" type="text" id="manNote" placeholder="备注（可选）"/>
      <button class="btn btn-log" onclick="addManual()">+ 添加</button>
    </div>
  </div>

  <!-- LOG TABLE -->
  <div class="log-section">
    <h3>📋 练习记录</h3>
    <div id="logWrap"></div>
  </div>

  <div class="quote-bar" id="quoteBar"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const GOAL = 1000;
let records = JSON.parse(localStorage.getItem('h1000_records') || '[]');

// ─── TIMER ──────────────────────────────────────────────────────────────────
let timerInterval = null;
let timerSeconds = 0;
let timerRunning = false;

function fmt(s) {
  const h = Math.floor(s / 3600).toString().padStart(2,'0');
  const m = Math.floor((s % 3600) / 60).toString().padStart(2,'0');
  const sec = (s % 60).toString().padStart(2,'0');
  return `${h}:${m}:${sec}`;
}

function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnPause').style.display = '';
  document.getElementById('btnStop').style.display = '';
  document.getElementById('timerSub').textContent = '计时中…专注就是力量！';
  timerInterval = setInterval(() => {
    timerSeconds++;
    document.getElementById('timerDisplay').textContent = fmt(timerSeconds);
  }, 1000);
}

function pauseTimer() {
  if (!timerRunning) {
    // resume
    timerRunning = true;
    document.getElementById('btnPause').textContent = '⏸ 暂停';
    document.getElementById('timerSub').textContent = '计时中…专注就是力量！';
    timerInterval = setInterval(() => {
      timerSeconds++;
      document.getElementById('timerDisplay').textContent = fmt(timerSeconds);
    }, 1000);
  } else {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('btnPause').textContent = '▶ 继续';
    document.getElementById('timerSub').textContent = '已暂停 — 随时继续';
  }
}

function stopTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnPause').style.display = 'none';
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('btnPause').textContent = '⏸ 暂停';
  document.getElementById('timerSub').textContent = '准备好了吗？点击开始记录今天的练习';
}

function saveSession() {
  const secs = timerSeconds;
  if (secs < 60) { showToast('⏱ 至少记录1分钟哦～'); return; }
  const hrs = +(secs / 3600).toFixed(2);
  const note = document.getElementById('sessionNote').value.trim() || '计时练习';
  const cat = document.getElementById('sessionCat').value;
  const today = new Date().toISOString().slice(0,10);
  records.push({ date: today, hours: hrs, cat, note });
  save();
  stopTimer();
  timerSeconds = 0;
  document.getElementById('timerDisplay').textContent = '00:00:00';
  document.getElementById('sessionNote').value = '';
  showToast(`✅ 已记录 ${hrs} 小时！`);
  render();
}

// ─── MANUAL ─────────────────────────────────────────────────────────────────
function addManual() {
  const date = document.getElementById('manDate').value;
  const hours = parseFloat(document.getElementById('manHours').value);
  const cat = document.getElementById('manCat').value;
  const note = document.getElementById('manNote').value.trim() || '手动补录';
  if (!date) { showToast('请选择日期'); return; }
  if (!hours || hours <= 0) { showToast('请输入有效小时数'); return; }
  records.push({ date, hours: +hours.toFixed(2), cat, note });
  save();
  document.getElementById('manDate').value = '';
  document.getElementById('manHours').value = '';
  document.getElementById('manNote').value = '';
  showToast(`✅ 已添加 ${hours} 小时`);
  render();
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function save() { localStorage.setItem('h1000_records', JSON.stringify(records)); }

// ─── RENDER ──────────────────────────────────────────────────────────────────
const MILESTONES = [50,100,200,300,500,700,800,1000];
const QUOTES = [
  '一万小时定律：只要坚持，每个人都能成为专家。',
  '没有捷径，只有积累。每一小时都算数。',
  '精耕细作，是成功唯一可靠的路。',
  '你今天的汗水，是明天的底气。',
  '1000小时，改变一生的投资。',
  '专注当下，成就未来。',
  '坚持的人，终将遇见更好的自己。',
];

function totalHours() { return records.reduce((s,r) => s + r.hours, 0); }

function render() {
  const total = +totalHours().toFixed(2);
  const pct = Math.min(100, +(total / GOAL * 100).toFixed(1));

  // ring
  const circ = 603.19;
  document.getElementById('ringCircle').style.strokeDashoffset = circ * (1 - pct/100);
  document.getElementById('ringPct').textContent = pct + '%';

  // stats
  const uniqueDays = [...new Set(records.map(r => r.date))].length;
  document.getElementById('statDone').textContent = total;
  document.getElementById('statDays').textContent = uniqueDays;
  document.getElementById('statCount').textContent = records.length;

  // progress bar
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = `${total} / ${GOAL} 小时`;

  // milestones
  const ms = document.getElementById('milestones');
  ms.innerHTML = MILESTONES.map(m =>
    `<div class="milestone ${total >= m ? 'done' : ''}">${m}h</div>`
  ).join('');

  // quote
  const q = QUOTES[Math.floor(total) % QUOTES.length];
  document.getElementById('quoteBar').textContent = `"${q}"`;

  // table
  const sorted = [...records].sort((a,b) => b.date.localeCompare(a.date));
  const wrap = document.getElementById('logWrap');
  if (!sorted.length) {
    wrap.innerHTML = '<div class="empty-tip"><span>🌱</span><p>还没有记录，开始你的第一次练习吧！</p></div>';
    return;
  }

  let html = `<table class="log-table">
    <thead><tr>
      <th>日期</th><th>类别</th><th>时长（h）</th><th>状态</th><th>备注</th>
      <th>操作</th>
    </tr></thead><tbody>`;
  sorted.forEach((r, idx) => {
    // find original index
    const origIdx = records.findIndex(x => x === r);
    const today = new Date().toISOString().slice(0,10);
    const statusHtml = r.date === today
      ? '<span style="color:#10b981;font-size:.78rem;font-weight:600">✅ 今日</span>'
      : '<span style="color:#9ca3af;font-size:.78rem">已完成</span>';
    html += `<tr>
      <td>${r.date}</td>
      <td><span class="badge-cat bc-${r.cat}">${r.cat}</span></td>
      <td>${r.hours}</td>
      <td>${statusHtml}</td>
      <td>${r.note}</td>
      <td><span style="cursor:pointer;color:#f87171;font-size:.8rem" onclick="deleteRecord(${origIdx})">删除</span></td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function deleteRecord(i) {
  if (!confirm('确认删除这条记录？')) return;
  records.splice(i, 1);
  save();
  render();
  showToast('已删除');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── CLOUD SYNC (GitHub Gist) ─────────────────────────────────────────────
const GIST_KEY = 'h1000_gist';
const GIST_FILE = 'h1000_data.json';

function getGistId(){ return localStorage.getItem(GIST_KEY) || ''; }
function setGistId(id){ localStorage.setItem(GIST_KEY, id); }

function setupGist(isReset){
  const oldToken = isReset ? '' : (localStorage.getItem('h1000_gist_token') || '');
  const oldGistId = isReset ? '' : getGistId();
  const token = prompt(
    (isReset ? '🔧 重新配置云端\n\n' : '') +
    '请输入 GitHub Personal Access Token（需要 gist 权限）\n\n获取方式：\n1. 打开 github.com/settings/tokens\n2. 点 Generate new token (classic)\n3. 勾选 gist 权限\n4. 生成后复制粘贴到此处',
    oldToken);
  if(!token) return false;
  localStorage.setItem('h1000_gist_token', token);
  const gistId = prompt('请输入 Gist ID（如果已有则填入，没有则留空会自动创建）：', oldGistId);
  if(gistId && gistId.trim()){ setGistId(gistId.trim()); } else { setGistId(''); }
  showToast(isReset ? '⚙️ 配置已更新' : '✅ 配置完成');
  return true;
}

function resetGistConfig(){
  const hasConfig = localStorage.getItem('h1000_gist_token') || getGistId();
  const msg = hasConfig
    ? `当前配置：\nGist ID: ${getGistId() || '未设置'}\nToken: ${localStorage.getItem('h1000_gist_token') ? '已设置 ✓' : '未设置'}\n\n点确定重新配置，取消不变`
    : '尚未配置云端，点确定开始配置';
  if(!confirm(msg)) return;
  setupGist(true);
}

async function cloudSave(){
  const token = localStorage.getItem('h1000_gist_token');
  if(!token){ if(!setupGist()) return; }
  const btn = document.getElementById('btnCloudSave');
  btn.disabled = true; btn.textContent = '⏳ 保存中...';
  try {
    const gistId = getGistId();
    const ts = new Date().toISOString().slice(0,19).replace('T',' ');
    const content = { data: records, lastSave: ts, version: '1.0' };
    if(gistId){
      const res = await fetch('https://api.github.com/gists/' + gistId, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: '1000小时精耕计划 - ' + ts, files: { [GIST_FILE]: { content: JSON.stringify(content, null, 2) } } })
      });
      if(!res.ok) throw new Error('HTTP ' + res.status);
    } else {
      const res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: '1000小时精耕计划', public: false, files: { [GIST_FILE]: { content: JSON.stringify(content, null, 2) } } })
      });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const result = await res.json();
      setGistId(result.id);
    }
    showToast('☁️ 数据已保存到云端！' + new Date().toLocaleTimeString());
  } catch(err){
    showToast('❌ 云端保存失败：' + err.message);
    if(err.message.includes('401') || err.message.includes('403')){
      localStorage.removeItem('h1000_gist_token');
      showToast('❌ Token 已失效，请重新配置');
    }
  } finally { btn.disabled = false; btn.textContent = '☁️ 云端保存'; }
}

async function cloudLoad(){
  const gistId = getGistId();
  const token = localStorage.getItem('h1000_gist_token');
  if(!gistId || !token){ if(!setupGist()) return; }
  const useGistId = getGistId();
  if(!useGistId){ showToast('❌ 还没有云端数据，请先保存一次'); return; }
  const btn = document.getElementById('btnCloudLoad');
  btn.disabled = true; btn.textContent = '⏳ 加载中...';
  try {
    const res = await fetch('https://api.github.com/gists/' + useGistId, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const gist = await res.json();
    const file = gist.files[GIST_FILE];
    if(!file) throw new Error('Gist 中没有找到数据文件');
    const cloud = JSON.parse(file.content);
    if(!cloud.data || !Array.isArray(cloud.data)){ throw new Error('数据格式不正确'); }

    const cloudCount = cloud.data.length;
    const localCount = records.length;

    const action = confirm(
      `云端数据：${cloudCount}条记录，最后保存 ${cloud.lastSave || '未知'}\n` +
      `本地数据：${localCount}条记录\n\n` +
      `确定 = 合并（保留本地+导入云端新增）\n` +
      `取消 = 替换（使用云端数据覆盖本地）`
    );

    if(action){
      const existing = new Set(records.map(r => JSON.stringify(r)));
      let added = 0;
      for(const rec of cloud.data){
        if(!existing.has(JSON.stringify(rec))){ records.push(rec); added++; }
      }
      save(); render();
      showToast(`☁️ 合并完成，新增 ${added} 条记录`);
    } else {
      records = cloud.data;
      save(); render();
      showToast('☁️ 已从云端恢复数据');
    }
  } catch(err){
    showToast('❌ 云端加载失败：' + err.message);
  } finally { btn.disabled = false; btn.textContent = '⬇️ 云端加载'; }
}

// ─── DATA SYNC ─────────────────────────────────────────────────────────────
function exportData(){
  const data = JSON.stringify(records, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `1000hours-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 数据已导出，保存好文件可跨设备同步');
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try {
      const imported = JSON.parse(ev.target.result);
      if(!Array.isArray(imported)){ showToast('❌ 文件格式不正确'); return; }
      const action = confirm('选择导入方式：\n\n确定 = 合并（保留现有+导入新增）\n取消 = 替换（清空现有，使用导入数据）');
      if(action){
        const existing = new Set(records.map(r=> JSON.stringify(r)));
        let added = 0;
        for(const rec of imported){
          if(!existing.has(JSON.stringify(rec))){
            records.push(rec);
            added++;
          }
        }
        showToast(`✅ 合并完成，新增 ${added} 条记录`);
      } else {
        records = imported;
        showToast('✅ 数据已替换');
      }
      save();
      render();
    } catch(err){
      showToast('❌ 读取失败：'+err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ─── INIT ────────────────────────────────────────────────────────────────────
document.getElementById('manDate').value = new Date().toISOString().slice(0,10);
render();
</script>
